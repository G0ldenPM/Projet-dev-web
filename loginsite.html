<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AutoMarket</title>
    <style>
        /* Reset et base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #000000; /* Fond noir pur */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Titre en arrière-plan */
        .bg-title {
            position: absolute;
            font-size: 15vw; /* Taille massive basée sur la largeur de l'écran */
            font-weight: 900;
            color: rgba(255, 0, 0, 0.05); /* Rouge très très discret */
            white-space: nowrap;
            z-index: 0;
            user-select: none;
            text-transform: uppercase;
        }

        /* Boîte de connexion */
        .login-card {
            position: relative;
            z-index: 1;
            background-color: #111111; /* Noir légèrement gris pour contraster */
            padding: 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h2 {
            color: #ffffff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Champs de saisie */
        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #888;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 5px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #ff0000; /* Bordure rouge au clic */
        }

        /* Bouton ROUGE */
        .btn-login {
            width: 100%;
            padding: 15px;
            background-color: #ff0000; /* Rouge vif */
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.3s, transform 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: #cc0000;
            transform: scale(1.02);
        }

        /* Liens */
        .options {
            margin-top: 20px;
            text-align: center;
        }

        .options a {
            color: #ff0000;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .options a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="bg-title">AUTOMARKET</div>

    <div class="login-card">
        <h2>Connexion</h2>
        <form action="#" method="POST">
            <div class="input-group">
                <label for="email">Identifiant</label>
                <input type="text" id="email" name="username" placeholder="Email ou Pseudo" required>
            </div>
            
            <div class="input-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Se connecter</button>
        </form>

        <div class="options">
            <a href="#">Mot de passe oublié ?</a>
            <p style="color:#444; margin-top: 15px;">Pas de compte ? <a href="#">S'inscrire</a></p>
        </div>
    </div>

</body>
</html>
